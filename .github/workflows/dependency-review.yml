name: Dependency Review

# Scans dependency changes in a PR and flags any that introduce a known
# vulnerability (or a disallowed license). Advisory — informative but not a
# required check, so a third-party outage never blocks a merge.

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
