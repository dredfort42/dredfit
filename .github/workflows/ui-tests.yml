name: UI Tests

# UI tests only — the unit suites already run on every push in ci.yml.
#
# These are slow (~20-45 min) and occasionally flaky on shared runners, so
# they deliberately do NOT gate anything: no PR checks, no release branches.
# A red run here is a signal to investigate before the next release, not a
# reason to hold one back. Release branches are gated by ci.yml (unit tests)
# plus a local UI run — see instructions/GIT_FLOW.md.
#
# Triggers:
#   - nightly on the default branch (develop)
#   - manually via "Run workflow" (any branch)

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-suite:
    name: DredfitUITests (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: ./.github/actions/setup-xcode

      - name: Select and boot iPhone simulator
        id: sim
        run: |
          line=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -1)
          device=$(echo "$line" | sed 's/ (.*//' | xargs)
          udid=$(echo "$line" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          if [ -z "$device" ] || [ -z "$udid" ]; then
            echo "No iPhone simulator found on runner" >&2
            exit 1
          fi
          echo "Using simulator: $device ($udid)"
          echo "device=$device" >> "$GITHUB_OUTPUT"
          # Pre-boot and wait for readiness so the first test isn't racing a
          # cold simulator boot under load (a frequent 'launch timed out').
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" || true

      - name: Run the UI tests
        run: |
          set -o pipefail
          # Shared macOS runners can't handle parallel UI testing: spawning
          # several simulator clones exhausts the runner, so clones fail to
          # connect ("lockdown timed out") or the host loses connection and
          # the whole run aborts. Disable parallelization so everything runs
          # on one simulator, serially — slower but stable. The same flag is
          # required locally; without it the runner is denied launch with
          # "Application failed preflight checks". (Locally that same error
          # also appears when the simulator already has the app installed by
          # hand — see instructions/GIT_FLOW.md step 0.)
          #
          # Retry is requested explicitly (xcodebuild ignores the test plan's
          # own repetition settings): a genuinely flaky test re-runs up to 3
          # attempts. System-level aborts aren't retried, which is why the
          # single simulator matters most.
          xcodebuild test \
            -project Dredfit.xcodeproj \
            -scheme Dredfit \
            -testPlan Dredfit \
            -only-testing:DredfitUITests \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -parallel-testing-enabled NO \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-ui
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
