name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: changelog
        run: |
          # Prefer the curated CHANGELOG.md section for this version; fall back
          # to a commit list if the tag has no matching section.
          if python3 scripts/changelog_section.py "$GITHUB_REF_NAME" > changelog.md; then
            echo "Using curated CHANGELOG.md section."
          else
            echo "No CHANGELOG.md section for $GITHUB_REF_NAME; using commit log."
            prev_tag=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
            if [ -n "$prev_tag" ]; then
              range="$prev_tag..$GITHUB_REF_NAME"
            else
              range="$GITHUB_REF_NAME"
            fi
            {
              echo "## Changes"
              echo
              git log --no-merges --pretty="- %s" "$range"
            } > changelog.md
          fi
          cat changelog.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file changelog.md \
            --verify-tag
