name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog from commits since previous tag
        id: changelog
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..$GITHUB_REF_NAME"
          else
            range="$GITHUB_REF_NAME"
          fi
          {
            echo "## Changes"
            echo
            git log --no-merges --pretty="- %s" "$range"
          } > changelog.md
          cat changelog.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file changelog.md \
            --verify-tag
