name: Full Tests

# The complete test plan including UI tests (~20-45 min, occasionally flaky
# on shared runners). Runs where it matters, off the PR hot path:
#   - nightly on the default branch (develop)
#   - on every push to release/** and hotfix/**
#   - manually via "Run workflow"

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    branches: ["release/**", "hotfix/**"]
  workflow_dispatch:

concurrency:
  group: full-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    name: Full test plan (unit + UI)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          xcode=$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)
          echo "Selected: $xcode"
          sudo xcode-select -s "$xcode"
          xcodebuild -version

      - name: Select iPhone simulator
        id: sim
        run: |
          device=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -1 | sed 's/ (.*//' | xargs)
          if [ -z "$device" ]; then
            echo "No iPhone simulator found on runner" >&2
            exit 1
          fi
          echo "Using simulator: $device"
          echo "device=$device" >> "$GITHUB_OUTPUT"

      - name: Run the full test plan
        run: |
          set -o pipefail
          # UI tests are occasionally flaky on shared runners: a launch can
          # time out, or a control's frame is momentarily invalid mid-animation.
          # xcodebuild ignores the test plan's own repetition settings, so the
          # retry is requested explicitly here — a failed test re-runs up to 3
          # attempts and only a genuinely broken test fails the job.
          xcodebuild test \
            -project Dredfit.xcodeproj \
            -scheme Dredfit \
            -testPlan Dredfit \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-full
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
