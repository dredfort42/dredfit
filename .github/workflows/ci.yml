name: CI

# Unit tests only (~5-15 min) — core package plus app units, no UI.
#
# This is the gate: green CI is what a merge and a release branch require.
# UI tests are deliberately not here. They are slow and occasionally flaky on
# shared runners, so they run nightly in ui-tests.yml and gate nothing; before
# cutting a release branch you run them locally instead (instructions/GIT_FLOW.md).

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: DredfitCore package tests
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          xcode=$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)
          echo "Selected: $xcode"
          sudo xcode-select -s "$xcode"
          xcodebuild -version

      - name: Run tests
        working-directory: DredfitCore
        run: swift test --parallel

  app-tests:
    name: Dredfit app unit tests (iOS Simulator, no UI)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          xcode=$(ls -d /Applications/Xcode_*.app | grep -v beta | sort -V | tail -1)
          echo "Selected: $xcode"
          sudo xcode-select -s "$xcode"
          xcodebuild -version

      - name: Select iPhone simulator
        id: sim
        run: |
          device=$(xcrun simctl list devices available | grep -E '^\s+iPhone' | head -1 | sed 's/ (.*//' | xargs)
          if [ -z "$device" ]; then
            echo "No iPhone simulator found on runner" >&2
            exit 1
          fi
          echo "Using simulator: $device"
          echo "device=$device" >> "$GITHUB_OUTPUT"

      - name: Build and test (UI tests excluded)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Dredfit.xcodeproj \
            -scheme Dredfit \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -skip-testing:DredfitUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          if-no-files-found: ignore
