version: 2
updates:
  # Keep GitHub Actions versions in workflows up to date.
  # Grouped into a single weekly PR instead of one per action, so a batch of
  # bumps is reviewed in one place.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: develop
    groups:
      github-actions:
        patterns:
          - "*"
    # Major bumps still appear (in the grouped PR) so nothing is silently held.
    # To make majors manual instead — patches/minors auto-flow, majors ignored —
    # uncomment:
    # ignore:
    #   - dependency-name: "*"
    #     update-types: ["version-update:semver-major"]

  # Swift package dependencies of DredfitCore. Currently a no-op — the package
  # has no external dependencies — kept so updates start flowing (grouped) the
  # day one is added.
  - package-ecosystem: swift
    directory: /DredfitCore
    schedule:
      interval: weekly
    target-branch: develop
    groups:
      swift:
        patterns:
          - "*"
